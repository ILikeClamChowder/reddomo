<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Red Domo mascot">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5a4a"/>
      <stop offset="0.55" stop-color="#e5352c"/>
      <stop offset="1" stop-color="#c0221c"/>
    </linearGradient>
    <linearGradient id="mouth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a0806"/>
      <stop offset="1" stop-color="#4d0f0b"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff7d6e" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff7d6e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- feet -->
  <rect x="46" y="188" width="38" height="24" rx="9" fill="#a81d18"/>
  <rect x="116" y="188" width="38" height="24" rx="9" fill="#a81d18"/>

  <!-- arms -->
  <rect x="6" y="96" width="26" height="60" rx="13" fill="#cf261f"/>
  <rect x="168" y="96" width="26" height="60" rx="13" fill="#cf261f"/>

  <!-- body -->
  <rect x="26" y="24" width="148" height="172" rx="30" fill="url(#body)"/>
  <!-- top sheen -->
  <rect x="40" y="36" width="120" height="30" rx="15" fill="#ffffff" opacity="0.10"/>

  <!-- cheeks -->
  <circle cx="52" cy="120" r="20" fill="url(#cheek)"/>
  <circle cx="148" cy="120" r="20" fill="url(#cheek)"/>

  <!-- eyes -->
  <g>
    <ellipse cx="74" cy="78" rx="15" ry="18" fill="#fdf3ec"/>
    <ellipse cx="126" cy="78" rx="15" ry="18" fill="#fdf3ec"/>
    <circle cx="77" cy="82" r="7.5" fill="#1c0b09"/>
    <circle cx="123" cy="82" r="7.5" fill="#1c0b09"/>
    <circle cx="80" cy="79" r="2.4" fill="#fff"/>
    <circle cx="126" cy="79" r="2.4" fill="#fff"/>
  </g>

  <!-- grinning jagged mouth -->
  <g>
    <rect x="52" y="112" width="96" height="52" rx="12" fill="url(#mouth)"/>
    <!-- top teeth (point down) -->
    <path d="M52 112 L66 134 L80 112 L94 134 L108 112 L122 134 L136 112 L148 112 L148 118 L52 118 Z" fill="#fdf3ec"/>
    <!-- bottom teeth (point up) -->
    <path d="M52 164 L66 142 L80 164 L94 142 L108 164 L122 142 L136 164 L148 164 L148 158 L52 158 Z" fill="#fdf3ec"/>
    <!-- tongue -->
    <ellipse cx="100" cy="156" rx="16" ry="9" fill="#ff6f79"/>
  </g>
</svg>
