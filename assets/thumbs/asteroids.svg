<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <radialGradient id="astbg" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#161a2e"/><stop offset="1" stop-color="#080911"/>
    </radialGradient>
  </defs>
  <rect width="320" height="320" fill="url(#astbg)"/>
  <!-- stars -->
  <g fill="#fff">
    <circle cx="40" cy="50" r="1.5" opacity=".8"/><circle cx="90" cy="90" r="1" opacity=".5"/>
    <circle cx="262" cy="58" r="1.5" opacity=".7"/><circle cx="222" cy="120" r="1" opacity=".5"/>
    <circle cx="58" cy="232" r="1.4" opacity=".7"/><circle cx="284" cy="248" r="1" opacity=".5"/>
    <circle cx="150" cy="38" r="1" opacity=".5"/><circle cx="300" cy="176" r="1.2" opacity=".6"/>
    <circle cx="120" cy="286" r="1.2" opacity=".55"/>
  </g>
  <!-- asteroids: hollow rocks -->
  <g fill="none" stroke="#c9cede" stroke-width="3" stroke-linejoin="round">
    <polygon points="70,88 100,76 120,94 112,124 84,132 60,114"/>
    <polygon points="236,182 263,174 283,194 275,222 247,228 227,206"/>
    <polygon points="182,244 200,236 216,248 212,266 192,272 178,258" stroke-width="2.5"/>
  </g>
  <!-- ship -->
  <g transform="translate(158,176) rotate(32)">
    <polygon points="0,-24 15,19 0,9 -15,19" fill="#f6ede8"/>
    <polygon points="0,11 6,21 0,36 -6,21" fill="#ff9838" opacity=".9"/>
