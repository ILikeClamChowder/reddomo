<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="fsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5ec6e8"/><stop offset="1" stop-color="#9be0d6"/>
    </linearGradient>
  </defs>
  <rect width="320" height="320" fill="url(#fsky)"/>
  <!-- clouds -->
  <g fill="#ffffff" opacity="0.9">
    <g transform="translate(70 70)"><circle r="20"/><circle cx="18" cy="6" r="16"/><circle cx="-18" cy="6" r="15"/><circle cx="7" cy="-9" r="14"/></g>
    <g transform="translate(250 120) scale(.8)"><circle r="20"/><circle cx="18" cy="6" r="16"/><circle cx="-18" cy="6" r="15"/></g>
  </g>
  <!-- sun -->
  <circle cx="255" cy="60" r="26" fill="#ffec9e" opacity=".85"/>
  <!-- ground strip -->
  <rect x="0" y="286" width="320" height="34" fill="#d8b06a"/>
  <rect x="0" y="286" width="320" height="9" fill="#7ac74f"/>
  <!-- flappy domo bird -->
  <g transform="translate(150 175)">
    <!-- wing -->
    <rect x="-40" y="-2" width="26" height="22" rx="9" fill="#b0231d"/>
    <!-- body -->
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ff4d42"/>
    <!-- eyes -->
    <circle cx="-8" cy="-12" r="10" fill="#fdf3ec"/><circle cx="18" cy="-12" r="10" fill="#fdf3ec"/>
    <circle cx="-4" cy="-12" r="4.6" fill="#1c0b09"/><circle cx="22" cy="-12" r="4.6" fill="#1c0b09"/>
    <!-- grin -->
    <rect x="-22" y="4" width="44" height="22" rx="5" fill="#2a0806"/>
    <path d="M-22 4 L-12 14 L-2 4 L8 14 L18 4 L22 4 L22 4 Z" fill="#fdf3ec"/>
    <!-- beak -->
    <path d="M30 -4 L48 4 L30 12 Z" fill="#f5a623"/>
  </g>
</svg>
