<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1c2e"/><stop offset=".5" stop-color="#7a3030"/><stop offset="1" stop-color="#c25a34"/>
    </linearGradient>
    <radialGradient id="sun" cx=".5" cy=".64" r=".4">
      <stop offset="0" stop-color="#ffd27a" stop-opacity=".8"/><stop offset="1" stop-color="#ffd27a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="320" fill="url(#sky)"/>
  <rect width="320" height="320" fill="url(#sun)"/>
  <!-- skyline -->
  <g fill="rgba(30,14,22,.55)">
    <rect x="10" y="150" width="34" height="90"/><rect x="50" y="120" width="26" height="120"/>
    <rect x="250" y="140" width="30" height="100"/><rect x="284" y="165" width="30" height="75"/>
    <rect x="0" y="175" width="18" height="65"/>
  </g>
  <!-- roof -->
  <rect x="70" y="232" width="180" height="70" fill="#241a20"/>
  <rect x="64" y="224" width="192" height="12" rx="3" fill="#3c2d34"/>
  <rect x="64" y="224" width="6" height="12" fill="#e5352c"/><rect x="250" y="224" width="6" height="12" fill="#e5352c"/>
  <!-- red fighter -->
  <g transform="translate(120 190)">
    <rect x="-20" y="-22" width="40" height="46" rx="9" fill="#ff5a4a"/>
    <circle cx="-8" cy="-8" r="5" fill="#fdf3ec"/><circle cx="8" cy="-8" r="5" fill="#fdf3ec"/>
    <circle cx="-6" cy="-7" r="2.4" fill="#1c0b09"/><circle cx="10" cy="-7" r="2.4" fill="#1c0b09"/>
    <path d="M-12 4 h24 v8 a12 6 0 0 1 -24 0 z" fill="#2a0806"/>
    <rect x="16" y="-2" width="18" height="7" rx="2" fill="#2b2b30"/>
  </g>
  <!-- blue fighter -->
  <g transform="translate(205 190) scale(-1 1)">
    <rect x="-20" y="-22" width="40" height="46" rx="9" fill="#5a9bff"/>
    <circle cx="-8" cy="-8" r="5" fill="#fdf3ec"/><circle cx="8" cy="-8" r="5" fill="#fdf3ec"/>
    <circle cx="-6" cy="-7" r="2.4" fill="#1c0b09"/><circle cx="10" cy="-7" r="2.4" fill="#1c0b09"/>
    <path d="M-12 4 h24 v8 a12 6 0 0 1 -24 0 z" fill="#0a1a2a"/>
    <rect x="16" y="-2" width="18" height="7" rx="2" fill="#2b2b30"/>
  </g>
  <!-- bullet spark -->
  <circle cx="162" cy="185" r="4" fill="#fff2c8"/>
  <rect x="150" y="183.5" width="14" height="3" rx="1.5" fill="#ffd27a"/>
</svg>
