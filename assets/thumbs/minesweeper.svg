<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="msbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3038"/><stop offset="1" stop-color="#191d22"/>
    </linearGradient>
  </defs>
  <rect width="320" height="320" fill="url(#msbg)"/>
  <!-- 4x4 grid, cells 56px at pitch 60, cols x=42,102,162,222 rows y=42,102,162,222 -->
  <!-- unrevealed cells (raised grey) -->
  <g>
    <g transform="translate(42,42)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(162,42)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(102,102)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(162,102)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(222,102)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(42,162)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(102,162)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(222,162)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(42,222)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(162,222)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
    <g transform="translate(222,222)"><rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/></g>
  </g>
  <!-- revealed number cells -->
  <g font-family="system-ui, sans-serif" font-weight="800" font-size="34" text-anchor="middle">
    <g transform="translate(102,42)"><rect width="56" height="56" rx="4" fill="#cdd3db"/><text x="28" y="40" fill="#2b5cd0">1</text></g>
    <g transform="translate(42,102)"><rect width="56" height="56" rx="4" fill="#cdd3db"/><text x="28" y="40" fill="#2f9e57">2</text></g>
    <g transform="translate(102,222)"><rect width="56" height="56" rx="4" fill="#cdd3db"/><text x="28" y="40" fill="#d63a3a">3</text></g>
  </g>
  <!-- flag cell -->
  <g transform="translate(222,42)">
    <rect width="56" height="56" rx="4" fill="#9099a3"/><rect width="56" height="6" rx="3" fill="#b6bfc9"/><rect y="50" width="56" height="6" rx="3" fill="#6c7580"/>
    <rect x="27" y="12" width="3" height="30" fill="#26262a"/>
    <path d="M27 13 L13 20 L27 27 Z" fill="#e5352c"/>
    <rect x="17" y="40" width="22" height="5" rx="2" fill="#26262a"/>
  </g>
  <!-- mine cell (exploded) -->
  <g transform="translate(162,162)">
    <rect width="56" height="56" rx="4" fill="#d98a80"/>
    <g transform="translate(28,28)">
      <g stroke="#1c1c1c" stroke-width="3" stroke-linecap="round">
        <line x1="-18" y1="0" x2="18" y2="0"/><line x1="0" y1="-18" x2="0" y2="18"/>
        <line x1="-13" y1="-13" x2="13" y2="13"/><line x1="-13" y1="13" x2="13" y2="-13"/>
      </g>
      <circle r="13" fill="#1c1c1c"/>
      <circle cx="-4" cy="-4" r="3.5" fill="#fff"/>
    </g>
  </g>
