<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="mcsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fc4ff"/><stop offset="1" stop-color="#bfe3ff"/>
    </linearGradient>
  </defs>
  <rect width="320" height="320" fill="url(#mcsky)"/>
  <!-- clouds -->
  <g fill="#ffffff" opacity=".8"><rect x="40" y="52" width="60" height="16"/><rect x="56" y="40" width="36" height="14"/><rect x="220" y="80" width="54" height="14"/></g>
  <!-- isometric grass block -->
  <g transform="translate(160 176)">
    <!-- top (grass) -->
    <polygon points="0,-70 84,-28 0,14 -84,-28" fill="#7bc043"/>
    <polygon points="0,-70 84,-28 0,14 -84,-28" fill="none" stroke="#5fa233" stroke-width="2"/>
    <!-- left face (dirt) -->
    <polygon points="-84,-28 0,14 0,96 -84,54" fill="#8a6239"/>
    <!-- right face (dirt) -->
    <polygon points="84,-28 0,14 0,96 84,54" fill="#6f4d2c"/>
    <!-- grass rim on faces -->
    <polygon points="-84,-28 0,14 0,26 -84,-16" fill="#6aa838"/>
    <polygon points="84,-28 0,14 0,26 84,-16" fill="#568c2c"/>
    <!-- pixel speckle -->
    <g fill="rgba(0,0,0,.12)"><rect x="-60" y="0" width="14" height="14"/><rect x="-30" y="30" width="14" height="14"/><rect x="24" y="10" width="14" height="14"/><rect x="46" y="46" width="14" height="14"/></g>
    <g fill="rgba(255,255,255,.14)"><rect x="-40" y="-46" width="16" height="10"/><rect x="8" y="-30" width="16" height="10"/></g>
  </g>
</svg>
