<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asteroids</title>
<style>
  html, body { margin:0; height:100%; background:#07060a; overflow:hidden; font-family:system-ui,sans-serif; color:#f6ede8; user-select:none; -webkit-tap-highlight-color:transparent; }
  #stage { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { width:100%; height:100%; object-fit:contain; display:block; }
</style>
</head>
<body>
<div id="stage"><canvas id="c" width="820" height="560"></canvas></div>
<script>
(function () {
  const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
  const W = 820, H = 560;
  const TAU = Math.PI * 2;

  let state = "ready";     // ready | play | dead | over
  let ship, bullets, rocks, particles, score, lives, wave, best, invuln, respawnT;
  best = Number(localStorage.getItem("asteroids_best") || 0);

  const keys = {};
  addEventListener("keydown", e => {
    const k = e.key.toLowerCase();
    if (["arrowup","arrowleft","arrowright"," ","w","a","d"].includes(k)) e.preventDefault();
    if ((k === " ") && !keys[" "]) shoot();
    if ((state === "ready" || state === "over") && (k === " " || k === "enter")) start();
    keys[k] = true;
  });
  addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
  // touch: tap to shoot/start
  canvas.addEventListener("touchstart", e => { e.preventDefault(); if (state==="ready"||state==="over") start(); else shoot(); }, {passive:false});

  function newShip() { return { x:W/2, y:H/2, a:-Math.PI/2, vx:0, vy:0, r:12 }; }
  function start() { ship = newShip(); bullets=[]; rocks=[]; particles=[]; score=0; lives=3; wave=0; invuln=2; respawnT=0; nextWave(); state="play"; }
  function reset() { ship = newShip(); bullets=[]; rocks=[]; particles=[]; score=0; lives=3; wave=0; invuln=0; respawnT=0; state="ready"; nextWave(); }

  function nextWave() { wave++; const n = 3 + wave; for (let i=0;i<n;i++) spawnRock(); }
  function spawnRock(x, y, size) {
    size = size || 3;
    if (x === undefined) { // spawn at edge away from ship
      const edge = Math.random()<.5;
      x = edge ? (Math.random()<.5?0:W) : Math.random()*W;
      y = edge ? Math.random()*H : (Math.random()<.5?0:H);
    }
    const a = Math.random()*TAU, sp = (40 + Math.random()*40) * (4-size)*0.6;
    const pts = []; const n = 9 + (Math.random()*4|0);
    for (let i=0;i<n;i++) pts.push(0.7 + Math.random()*0.5);
    rocks.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, size, r:size*14, rot:Math.random()*TAU, vr:(Math.random()-.5)*1.2, pts });
  }

  let shootCd = 0;
  function shoot() {
    if (state !== "play" || shootCd > 0) return;
    shootCd = 0.18;
    bullets.push({ x: ship.x + Math.cos(ship.a)*14, y: ship.y + Math.sin(ship.a)*14, vx: Math.cos(ship.a)*440 + ship.vx, vy: Math.sin(ship.a)*440 + ship.vy, life: 1.1 });
  }

  function wrap(o) { if (o.x<0)o.x+=W; if(o.x>W)o.x-=W; if(o.y<0)o.y+=H; if(o.y>H)o.y-=H; }

  let last = performance.now();
  function frame(now) {
    let dt=(now-last)/1000; last=now; if(dt>0.033)dt=0.033;
    if (state === "play" || state === "dead") update(dt);
    render();
    requestAnimationFrame(frame);
  }

  function update(dt) {
    shootCd = Math.max(0, shootCd - dt);
    invuln = Math.max(0, invuln - dt);

    if (state === "play") {
      if (keys["arrowleft"]||keys["a"]) ship.a -= 3.6*dt;
      if (keys["arrowright"]||keys["d"]) ship.a += 3.6*dt;
      if (keys["arrowup"]||keys["w"]) { ship.vx += Math.cos(ship.a)*320*dt; ship.vy += Math.sin(ship.a)*320*dt;
        if (Math.random()<0.6) particles.push({x:ship.x-Math.cos(ship.a)*12, y:ship.y-Math.sin(ship.a)*12, vx:-Math.cos(ship.a)*120+(Math.random()-.5)*60, vy:-Math.sin(ship.a)*120+(Math.random()-.5)*60, life:.3, max:.3, c:"255,180,90"}); }
      ship.vx *= (1 - 0.5*dt); ship.vy *= (1 - 0.5*dt);
      ship.x += ship.vx*dt; ship.y += ship.vy*dt; wrap(ship);
    } else { respawnT -= dt; if (respawnT <= 0) { if (lives>0) { ship=newShip(); invuln=2.5; state="play"; } } }

    for (const b of bullets) { b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; wrap(b); }
    bullets = bullets.filter(b=>b.life>0);

    for (const r of rocks) { r.x+=r.vx*dt; r.y+=r.vy*dt; r.rot+=r.vr*dt; wrap(r); }
    for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; }
    particles = particles.filter(p=>p.life>0);

    // bullet vs rock
    for (const b of bullets) for (const r of rocks) {
      if (r.dead) continue;
      if (Math.hypot(b.x-r.x, b.y-r.y) < r.r) {
        b.life=0; r.dead=true; score += (4-r.size)*20; if(score>best){best=score;localStorage.setItem("asteroids_best",best);}
        burst(r.x, r.y, r.r);
        if (r.size>1) { spawnRock(r.x,r.y,r.size-1); spawnRock(r.x,r.y,r.size-1); }
      }
    }
    rocks = rocks.filter(r=>!r.dead);

    // ship vs rock
    if (state==="play" && invuln<=0) for (const r of rocks) {
      if (Math.hypot(ship.x-r.x, ship.y-r.y) < r.r + ship.r) { die(); break; }
    }
    if (rocks.length === 0 && state==="play") nextWave();
  }
  function die() { lives--; burst(ship.x, ship.y, 20); state = lives>0 ? "dead" : "over"; respawnT = 1.2;
    if (state==="over" && score>best){best=score;localStorage.setItem("asteroids_best",best);} }
  function burst(x,y,r){ for(let i=0;i<12;i++){const a=Math.random()*TAU,s=40+Math.random()*160; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5+Math.random()*.3,max:.8,c:"200,220,255"});} }

  function render() {
    ctx.fillStyle="#07060a"; ctx.fillRect(0,0,W,H);
    // stars
    ctx.fillStyle="rgba(255,255,255,.5)"; for(let i=0;i<60;i++){ const x=(i*137)%W, y=(i*89)%H; ctx.fillRect(x,y,(i%5===0)?2:1,(i%5===0)?2:1); }

    for (const p of particles) { ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle="rgb("+p.c+")"; ctx.fillRect(p.x-1,p.y-1,2.4,2.4); }
    ctx.globalAlpha=1;

    ctx.strokeStyle="#cfe0ff"; ctx.lineWidth=2; ctx.lineJoin="round";
    for (const r of rocks) { ctx.save(); ctx.translate(r.x,r.y); ctx.rotate(r.rot); ctx.beginPath();
      for (let i=0;i<r.pts.length;i++){ const ang=i/r.pts.length*TAU, rad=r.r*r.pts[i]; const px=Math.cos(ang)*rad, py=Math.sin(ang)*rad; i?ctx.lineTo(px,py):ctx.moveTo(px,py); }
      ctx.closePath(); ctx.stroke(); ctx.restore(); }

    for (const b of bullets) { ctx.fillStyle="#ffd27a"; ctx.beginPath(); ctx.arc(b.x,b.y,2.6,0,TAU); ctx.fill(); }

    if (state==="play") drawShip();

    // HUD
    ctx.fillStyle="#f6ede8"; ctx.font="700 18px system-ui"; ctx.textAlign="left"; ctx.fillText("SCORE "+score, 18, 32);
    ctx.textAlign="right"; ctx.fillText("BEST "+best, W-18, 32);
    ctx.textAlign="left"; for (let i=0;i<lives;i++) shipIcon(20+i*22, 48);

    if (state==="ready") banner("ASTEROIDS", "← → rotate · ↑ thrust · Space shoot", "Space / tap to start");
    else if (state==="over") banner("Game Over", "Score "+score+" · Best "+best, "Space / tap to play again");
    else if (state==="dead") { ctx.textAlign="center"; ctx.fillStyle="rgba(255,255,255,.85)"; ctx.font="700 22px system-ui"; ctx.fillText("Ships left: "+lives, W/2, H/2); }
  }
  function drawShip() {
    if (invuln>0 && Math.floor(invuln*10)%2===0) return; // blink
    ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.a);
    ctx.strokeStyle="#ff5a4a"; ctx.lineWidth=2.4; ctx.lineJoin="round"; ctx.beginPath();
    ctx.moveTo(15,0); ctx.lineTo(-11,-9); ctx.lineTo(-6,0); ctx.lineTo(-11,9); ctx.closePath(); ctx.stroke();
    ctx.restore();
  }
  function shipIcon(x,y){ ctx.save(); ctx.translate(x,y); ctx.rotate(-Math.PI/2); ctx.strokeStyle="#ff5a4a"; ctx.lineWidth=2; ctx.beginPath();
    ctx.moveTo(9,0); ctx.lineTo(-7,-6); ctx.lineTo(-3,0); ctx.lineTo(-7,6); ctx.closePath(); ctx.stroke(); ctx.restore(); }
  function banner(title, sub, sub2) {
    ctx.textAlign="center";
    ctx.fillStyle="#fff"; ctx.font="900 52px system-ui"; ctx.fillText(title, W/2, H/2-20);
    ctx.fillStyle="rgba(255,255,255,.85)"; ctx.font="600 18px system-ui"; ctx.fillText(sub, W/2, H/2+16);
    if(sub2){ ctx.fillStyle="rgba(255,255,255,.65)"; ctx.font="600 16px system-ui"; ctx.fillText(sub2, W/2, H/2+44); }
  }

  reset();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
